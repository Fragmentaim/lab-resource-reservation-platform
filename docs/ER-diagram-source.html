<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>实验室资源预约系统核心 E-R 图</title>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif;
    }

    svg {
      display: block;
      width: 1800px;
      height: 1050px;
      background: #fff;
    }

    .entity,
    .relation,
    .attr {
      fill: #fff;
      stroke: #111;
      stroke-width: 2;
    }

    .dash {
      stroke-dasharray: 8 8;
    }

    .line {
      stroke: #111;
      stroke-width: 2;
      fill: none;
    }

    .text {
      fill: #111;
      font-size: 28px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .attr-text {
      fill: #111;
      font-size: 24px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .small {
      font-size: 22px;
    }

    .cardinality {
      fill: #111;
      font-size: 26px;
      text-anchor: middle;
      dominant-baseline: middle;
      font-family: Georgia, "Times New Roman", serif;
    }

    .note {
      fill: #555;
      font-size: 22px;
      text-anchor: middle;
    }

    .note-start {
      fill: #555;
      font-size: 22px;
      text-anchor: start;
    }

    .title {
      fill: #111;
      font-size: 34px;
      font-weight: 700;
      text-anchor: middle;
    }

    .section {
      fill: #333;
      font-size: 22px;
      font-weight: 700;
      text-anchor: start;
    }

    .pk {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<svg viewBox="0 0 1800 1050" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1800" height="1050" fill="#fff" />
  <text x="900" y="48" class="title">实验室资源预约系统核心 E-R 图</text>
  <text x="900" y="82" class="note">展示核心数据库设计：用户、资源、时段、预约、通知、提醒任务、字典</text>

  <!-- User entity -->
  <rect x="110" y="405" width="190" height="76" class="entity" />
  <text x="205" y="443" class="text">用户</text>
  <ellipse cx="105" cy="255" rx="92" ry="38" class="attr" />
  <text x="105" y="255" class="attr-text pk">用户编号</text>
  <line x1="150" y1="287" x2="178" y2="405" class="line" />
  <ellipse cx="92" cy="350" rx="80" ry="36" class="attr" />
  <text x="92" y="350" class="attr-text">用户名</text>
  <line x1="158" y1="370" x2="110" y2="420" class="line" />
  <ellipse cx="88" cy="535" rx="70" ry="36" class="attr" />
  <text x="88" y="535" class="attr-text">角色</text>
  <line x1="150" y1="516" x2="110" y2="470" class="line" />
  <ellipse cx="118" cy="630" rx="72" ry="36" class="attr" />
  <text x="118" y="630" class="attr-text">状态</text>
  <line x1="145" y1="597" x2="205" y2="481" class="line" />

  <!-- Submit relation -->
  <polygon points="455,443 530,395 605,443 530,491" class="relation" />
  <text x="530" y="443" class="text">提交</text>
  <line x1="300" y1="443" x2="455" y2="443" class="line" />
  <line x1="605" y1="443" x2="745" y2="443" class="line" />
  <text x="345" y="425" class="cardinality">1</text>
  <text x="690" y="425" class="cardinality">N</text>

  <!-- Reservation entity -->
  <rect x="745" y="405" width="230" height="76" class="entity" />
  <text x="860" y="443" class="text">预约记录</text>
  <ellipse cx="680" cy="260" rx="100" ry="38" class="attr" />
  <text x="680" y="260" class="attr-text pk">预约编号</text>
  <line x1="730" y1="292" x2="800" y2="405" class="line" />
  <ellipse cx="860" cy="250" rx="92" ry="38" class="attr" />
  <text x="860" y="250" class="attr-text">预约状态</text>
  <line x1="860" y1="288" x2="860" y2="405" class="line" />
  <ellipse cx="1035" cy="300" rx="92" ry="38" class="attr" />
  <text x="1035" y="300" class="attr-text">预约时间</text>
  <line x1="985" y1="332" x2="920" y2="405" class="line" />
  <ellipse cx="850" cy="585" rx="92" ry="38" class="attr" />
  <text x="850" y="585" class="attr-text">取消原因</text>
  <line x1="850" y1="547" x2="850" y2="481" class="line" />

  <!-- Resource entity -->
  <rect x="1280" y="165" width="220" height="76" class="entity" />
  <text x="1390" y="203" class="text">实验室资源</text>
  <ellipse cx="1240" cy="70" rx="98" ry="38" class="attr" />
  <text x="1240" y="70" class="attr-text pk">资源编号</text>
  <line x1="1285" y1="103" x2="1340" y2="165" class="line" />
  <ellipse cx="1425" cy="70" rx="92" ry="38" class="attr" />
  <text x="1425" y="70" class="attr-text">资源名称</text>
  <line x1="1415" y1="108" x2="1400" y2="165" class="line" />
  <ellipse cx="1600" cy="120" rx="92" ry="38" class="attr" />
  <text x="1600" y="120" class="attr-text">资源类型</text>
  <line x1="1532" y1="144" x2="1500" y2="180" class="line" />
  <ellipse cx="1605" cy="230" rx="92" ry="38" class="attr" />
  <text x="1605" y="230" class="attr-text">资源状态</text>
  <line x1="1515" y1="225" x2="1500" y2="215" class="line" />
  <ellipse cx="1390" cy="320" rx="70" ry="36" class="attr" />
  <text x="1390" y="320" class="attr-text">位置</text>
  <line x1="1390" y1="284" x2="1390" y2="241" class="line" />

  <!-- Resource-reservation relation -->
  <polygon points="1110,300 1188,252 1266,300 1188,348" class="relation" />
  <text x="1188" y="300" class="text">被预约</text>
  <line x1="975" y1="405" x2="1110" y2="300" class="line" />
  <line x1="1266" y1="300" x2="1330" y2="241" class="line" />
  <text x="1040" y="350" class="cardinality">N</text>
  <text x="1305" y="265" class="cardinality">1</text>

  <!-- Slot entity -->
  <rect x="1280" y="565" width="220" height="76" class="entity" />
  <text x="1390" y="603" class="text">预约时段</text>
  <ellipse cx="1235" cy="480" rx="92" ry="38" class="attr" />
  <text x="1235" y="480" class="attr-text pk">时段编号</text>
  <line x1="1270" y1="515" x2="1320" y2="565" class="line" />
  <ellipse cx="1602" cy="470" rx="92" ry="38" class="attr" />
  <text x="1602" y="470" class="attr-text">起止时间</text>
  <line x1="1535" y1="495" x2="1500" y2="565" class="line" />
  <ellipse cx="1615" cy="580" rx="92" ry="38" class="attr" />
  <text x="1615" y="580" class="attr-text">总名额</text>
  <line x1="1520" y1="590" x2="1500" y2="595" class="line" />
  <ellipse cx="1615" cy="690" rx="92" ry="38" class="attr" />
  <text x="1615" y="690" class="attr-text">剩余名额</text>
  <line x1="1535" y1="667" x2="1500" y2="630" class="line" />
  <ellipse cx="1390" cy="735" rx="92" ry="38" class="attr" />
  <text x="1390" y="735" class="attr-text">时段状态</text>
  <line x1="1390" y1="697" x2="1390" y2="641" class="line" />

  <!-- Resource-slot relation -->
  <polygon points="1315,385 1390,337 1465,385 1390,433" class="relation" />
  <text x="1390" y="385" class="text">配置</text>
  <line x1="1390" y1="241" x2="1390" y2="337" class="line" />
  <line x1="1390" y1="433" x2="1390" y2="565" class="line" />
  <text x="1415" y="285" class="cardinality">1</text>
  <text x="1415" y="510" class="cardinality">N</text>

  <!-- Slot-reservation relation -->
  <polygon points="1110,565 1188,517 1266,565 1188,613" class="relation" />
  <text x="1188" y="565" class="text">对应</text>
  <line x1="975" y1="481" x2="1110" y2="565" class="line" />
  <line x1="1266" y1="565" x2="1280" y2="590" class="line" />
  <text x="1038" y="525" class="cardinality">N</text>
  <text x="1272" y="548" class="cardinality">1</text>

  <!-- Reminder task -->
  <text x="110" y="770" class="section">提醒与通知</text>
  <rect x="650" y="765" width="220" height="70" class="entity" />
  <text x="760" y="800" class="text">提醒任务</text>
  <ellipse cx="600" cy="905" rx="92" ry="36" class="attr" />
  <text x="600" y="905" class="attr-text pk">任务编号</text>
  <line x1="640" y1="875" x2="705" y2="835" class="line" />
  <ellipse cx="760" cy="940" rx="105" ry="36" class="attr" />
  <text x="760" y="940" class="attr-text">计划发送时间</text>
  <line x1="760" y1="904" x2="760" y2="835" class="line" />
  <ellipse cx="930" cy="905" rx="92" ry="36" class="attr" />
  <text x="930" y="905" class="attr-text">任务状态</text>
  <line x1="885" y1="875" x2="820" y2="835" class="line" />

  <polygon points="760,650 835,695 760,740 685,695" class="relation" />
  <text x="760" y="695" class="text">生成</text>
  <line x1="820" y1="481" x2="760" y2="650" class="line" />
  <line x1="760" y1="740" x2="760" y2="765" class="line" />
  <text x="795" y="610" class="cardinality">1</text>
  <text x="790" y="752" class="cardinality">N</text>

  <!-- Notification -->
  <rect x="180" y="765" width="220" height="70" class="entity" />
  <text x="290" y="800" class="text">用户通知</text>
  <ellipse cx="115" cy="905" rx="92" ry="36" class="attr" />
  <text x="115" y="905" class="attr-text pk">通知编号</text>
  <line x1="160" y1="875" x2="230" y2="835" class="line" />
  <ellipse cx="290" cy="940" rx="92" ry="36" class="attr" />
  <text x="290" y="940" class="attr-text">通知标题</text>
  <line x1="290" y1="904" x2="290" y2="835" class="line" />
  <ellipse cx="465" cy="905" rx="92" ry="36" class="attr" />
  <text x="465" y="905" class="attr-text">是否已读</text>
  <line x1="420" y1="875" x2="350" y2="835" class="line" />

  <polygon points="465,800 535,756 605,800 535,844" class="relation" />
  <text x="535" y="800" class="text">产生</text>
  <line x1="400" y1="800" x2="465" y2="800" class="line" />
  <line x1="605" y1="800" x2="650" y2="800" class="line" />
  <text x="430" y="780" class="cardinality">0..1</text>
  <text x="625" y="780" class="cardinality">1</text>

  <polygon points="235,670 305,626 375,670 305,714" class="relation" />
  <text x="305" y="670" class="text">接收</text>
  <line x1="205" y1="481" x2="305" y2="626" class="line" />
  <line x1="305" y1="714" x2="290" y2="765" class="line" />
  <text x="230" y="575" class="cardinality">1</text>
  <text x="330" y="745" class="cardinality">N</text>

  <!-- Dictionary block -->
  <text x="1090" y="810" class="section">基础字典</text>
  <rect x="1080" y="855" width="185" height="68" class="entity" />
  <text x="1172" y="889" class="text small">字典类型</text>
  <rect x="1500" y="855" width="185" height="68" class="entity" />
  <text x="1592" y="889" class="text small">字典数据</text>
  <polygon points="1310,889 1385,844 1460,889 1385,934" class="relation" />
  <text x="1385" y="889" class="text small">包含</text>
  <line x1="1265" y1="889" x2="1310" y2="889" class="line" />
  <line x1="1460" y1="889" x2="1500" y2="889" class="line" />
  <text x="1288" y="867" class="cardinality">1</text>
  <text x="1480" y="867" class="cardinality">N</text>
  <ellipse cx="1075" cy="985" rx="96" ry="34" class="attr" />
  <text x="1075" y="985" class="attr-text pk small">字典类型编号</text>
  <line x1="1115" y1="955" x2="1140" y2="923" class="line" />
  <ellipse cx="1235" cy="985" rx="82" ry="34" class="attr" />
  <text x="1235" y="985" class="attr-text small">字典名称</text>
  <line x1="1220" y1="952" x2="1195" y2="923" class="line" />
  <ellipse cx="1518" cy="985" rx="90" ry="34" class="attr" />
  <text x="1518" y="985" class="attr-text pk small">字典项编号</text>
  <line x1="1542" y1="952" x2="1565" y2="923" class="line" />
  <ellipse cx="1668" cy="985" rx="72" ry="34" class="attr" />
  <text x="1668" y="985" class="attr-text small">字典值</text>
  <line x1="1640" y1="954" x2="1620" y2="923" class="line" />

  <rect x="1455" y="760" width="300" height="54" rx="10" fill="#fff" stroke="#ddd" />
  <text x="1605" y="794" class="note">字典数据用于定义类型和状态字段</text>

  <!-- Legend -->
  <rect x="40" y="970" width="760" height="46" rx="8" fill="#fff" stroke="#ddd" />
  <text x="60" y="1000" class="note-start">说明：带下划线属性为主键；字典表用于维护资源类型、资源状态、时段状态、用户角色等基础数据。</text>
</svg>
</body>
</html>
